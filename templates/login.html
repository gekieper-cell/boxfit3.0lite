<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoxFit Lite - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-gray-900 to-gray-800 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white/10 backdrop-blur-lg rounded-2xl shadow-2xl p-8 w-full max-w-md border border-white/20">
        <div class="text-center mb-8">
            <div class="bg-gradient-to-r from-blue-500 to-blue-600 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                <i class="fas fa-dumbbell text-3xl text-white"></i>
            </div>
            <h1 class="text-3xl font-bold text-white">BoxFit Lite</h1>
            <p class="text-gray-300 mt-2">Sistema de Gestión</p>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="mb-4 p-3 rounded-xl {% if category=='success' %}bg-green-500/20 border border-green-500 text-green-200{% else %}bg-red-500/20 border border-red-500 text-red-200{% endif %}">
                    <i class="fas fa-{% if category=='success' %}check-circle{% else %}exclamation-circle{% endif %} mr-2"></i>
                    {{ message }}
                </div>
            {% endfor %}
        {% endwith %}
        <form method="POST">
            <div class="mb-4">
                <label class="block text-gray-300 mb-2 text-sm">Usuario</label>
                <input type="text" name="username" class="w-full p-3 rounded-xl bg-white/10 border border-white/20 text-white focus:border-blue-500 focus:outline-none" required autofocus>
            </div>
            <div class="mb-6">
                <label class="block text-gray-300 mb-2 text-sm">Contraseña</label>
                <input type="password" name="password" class="w-full p-3 rounded-xl bg-white/10 border border-white/20 text-white focus:border-blue-500 focus:outline-none" required>
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white font-bold py-3 rounded-xl transition">
                <i class="fas fa-sign-in-alt"></i> Ingresar
            </button>
        </form>
        <div class="mt-6 text-center text-gray-400 text-xs">
            <p>© 2024 BoxFit Lite</p>
        </div>
    </div>
</body>
</html>
