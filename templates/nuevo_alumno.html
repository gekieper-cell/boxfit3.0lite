{% extends "base.html" %}
{% block title %}Nuevo Alumno{% endblock %}

{% block content %}
<div class="mb-5"><h2 class="text-xl font-semibold">Nuevo Alumno</h2><p class="text-gray-500 text-sm">Registrar un nuevo alumno regular</p></div>

<div class="card max-w-2xl">
    <div class="card-body">
        <form method="POST">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="form-group"><label class="form-label">Nombre completo *</label><input type="text" name="nombre" required class="form-control"></div>
                <div class="form-group"><label class="form-label">DNI *</label><input type="text" name="dni" required class="form-control"></div>
                <div class="form-group"><label class="form-label">Teléfono</label><input type="text" name="telefono" class="form-control" placeholder="Ej: 5491112345678"></div>
                <div class="form-group"><label class="form-label">Email</label><input type="email" name="email" class="form-control"></div>
                <div class="form-group"><label class="form-label">Valor de cuota mensual</label><input type="number" name="valor_cuota" value="{{ config.get('cuota_normal', 15000) }}" step="0.01" class="form-control"></div>
            </div>
            <div class="flex gap-3 mt-4"><button type="submit" class="btn btn-primary">Guardar Alumno</button><a href="{{ url_for('alumnos') }}" class="btn btn-outline">Cancelar</a></div>
        </form>
    </div>
</div>
{% endblock %}
